[package]
name = "scarllet-llm"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tracing = "0.1"
futures-core = "0.3"
tokio-stream = "0.1"
bytes = "1"
tokio = { version = "1", features = ["sync"] }
