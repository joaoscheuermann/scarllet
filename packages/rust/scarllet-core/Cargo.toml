[package]
name = "scarllet-core"
version = "0.1.0"
edition = "2021"

[lib]
name = "scarllet_core"
path = "src/lib.rs"

[[bin]]
name = "scarllet-core"
path = "src/main.rs"

[dependencies]
scarllet-proto = { path = "../scarllet-proto" }
scarllet-sdk = { path = "../scarllet-sdk" }
tonic = "0.14"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["net"] }
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }
notify = "7"
serde_json = "1"
dirs = "6"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
