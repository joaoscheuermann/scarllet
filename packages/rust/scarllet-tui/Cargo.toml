[package]
name = "scarllet-tui"
version = "0.1.0"
edition = "2021"

[dependencies]
scarllet-proto = { path = "../scarllet-proto" }
scarllet-sdk = { path = "../scarllet-sdk" }
tonic = "0.14"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
crossterm = "0.29"
tui-markdown = { version = "0.3", features = ["highlight-code"] }
